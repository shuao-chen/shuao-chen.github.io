<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
    .mjx-copytext {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }
    mjx-container {
      position: relative !important;
    }
  </style>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        tags: 'ams'
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        renderActions: {
          addCopyText: [155,
            (doc) => {
              for (const math of doc.math) {
                MathJax.config.addCopyText(math, doc);
              }
            },
            (math, doc) => {
              MathJax.config.addCopyText(math, doc);
            }
          ]
        }
      },
      addCopyText(math, doc) {
        const adaptor = doc.adaptor;
        // 关键修复：使用标准的 HTML 属性名 'class'，这样上方的 CSS 才能精准捕获并隐藏它
        const text = adaptor.node('span', {'class': 'mjx-copytext', 'aria-hidden': true}, [
          adaptor.text(math.start.delim + math.math + math.end.delim)
        ]);
        adaptor.append(math.typesetRoot, text);
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
