<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
    /*
      ===== 可选功能：复制 LaTeX 源码 =====
      默认关闭（不会影响页面）
      如需开启，将 JS 中的 ENABLE_COPY_LATEX 设为 true
    */

    .mjx-copytext {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      margin: -1px !important;
      padding: 0 !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    mjx-container {
      position: relative !important;
    }

    /*
      ===== 分类 & 标签样式 =====
    */
    .post-meta-extended {
      margin-top: 6px;
      font-size: 0.9em;
      color: #828282;
    }

    .post-category {
      color: #2a7ae2;
      font-weight: 500;
    }

    .post-tag {
      color: #666;
    }
  </style>

  <script>
    /*
      ===== 开关：是否启用“复制 LaTeX 源码” =====
      false = 关闭
      true  = 开启
    */
    const ENABLE_COPY_LATEX = false;

    window.MathJax = {
      /*
        加载 ams 扩展（支持 aligned、cases、\text 等）
      */
      loader: {
        load: ['[tex]/ams']
      },

      tex: {
        /*
          支持：
          $...$
          \(...\)
          $$...$$
          \[...\]
        */
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        tags: 'ams',

        packages: { '[+]': ['ams'] }
      },

      options: {
        /*
          避免在这些标签中解析数学
        */
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],

        /*
          根据开关决定是否启用复制功能
        */
        renderActions: ENABLE_COPY_LATEX ? {
          addCopyText: [155, (doc) => {
            for (const math of doc.math) {
              MathJax.config.addCopyText(math, doc);
            }
          }]
        } : {}
      },

      /*
        ===== 可选：复制 LaTeX 源码 =====
      */
      addCopyText(math, doc) {
        if (!ENABLE_COPY_LATEX) return;

        const adaptor = doc.adaptor;
        const latexSource = math.start.delim + math.math + math.end.delim;

        const hiddenText = adaptor.node(
          'span',
          {
            class: 'mjx-copytext',
            'aria-hidden': 'true'
          },
          [adaptor.text(latexSource)]
        );

        adaptor.append(math.typesetRoot, hiddenText);
      }
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
