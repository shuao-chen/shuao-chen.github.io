<head>
  <!-- 基础网页信息 -->
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO 信息 -->
  {%- seo -%}

  <!-- 主题主样式 -->
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">

  <!-- RSS/Feed 信息 -->
  {%- feed_meta -%}

  <style>
    /* 用于隐藏 LaTeX 源码文本，不影响页面显示 */
    .mjx-copytext {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      margin: -1px !important;
      padding: 0 !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    /* 让 MathJax 容器支持插入隐藏节点 */
    mjx-container {
      position: relative !important;
    }
  </style>

  <script>
    /* 是否启用“复制 LaTeX 源码”功能 */
    const ENABLE_COPY_LATEX = true;

    /* 向每个公式节点中插入隐藏的 LaTeX 源码 */
    function addCopyText(math, doc) {
      if (!ENABLE_COPY_LATEX) return;

      const adaptor = doc.adaptor;
      const latexSource = math.start.delim + math.math + math.end.delim;

      const hiddenText = adaptor.node(
        'span',
        {
          class: 'mjx-copytext',
          'aria-hidden': 'true'
        },
        [adaptor.text(latexSource)]
      );

      adaptor.append(math.typesetRoot, hiddenText);
    }

    /* MathJax 配置 */
    window.MathJax = {
      loader: {
        load: ['[tex]/ams']
      },

      tex: {
        /* 支持行内与行间公式 */
        inlineMath: [['$', '$']],        
        displayMath: [['$$', '$$']],
        processEscapes: true,

        /* 使用 AMS 自动编号 */
        tags: 'ams',
        packages: { '[+]': ['ams'] }
      },

      options: {
        /* 这些标签中的内容不解析为公式 */
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],

        /* 按开关决定是否插入 LaTeX 源码 */
        renderActions: ENABLE_COPY_LATEX
          ? {
              addCopyText: [155, (doc) => {
                for (const math of doc.math) {
                  addCopyText(math, doc);
                }
              }]
            }
          : {}
      }
    };
  </script>

  <!-- MathJax 主脚本 -->
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
