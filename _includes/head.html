<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
    .mjx-copytext {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      border: 0;
      white-space: nowrap;
    }
    mjx-container {
      position: relative !important;
    }
  </style>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        tags: 'ams'
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        // 2. 渲染动作：只负责把包裹在 span 里的源码插入到 DOM 中
        renderActions: {
          addCopyText: [155,
            (doc) => {
              for (const math of doc.math) {
                MathJax.config.addCopyText(math, doc);
              }
            },
            (math, doc) => {
              MathJax.config.addCopyText(math, doc);
            }
          ]
        }
      },
      addCopyText(math, doc) {
        const adaptor = doc.adaptor;
        // 创建一个带有 .mjx-copytext 类的 span 标签
        const text = adaptor.node('span', {className: 'mjx-copytext', 'aria-hidden': true}, [
          adaptor.text(math.start.delim + math.math + math.end.delim)
        ]);
        adaptor.append(math.typesetRoot, text);
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
