<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
    /*
      ===== 可选功能：复制 LaTeX 源码 =====
      默认关闭（不会影响页面）
      如需开启，将 JS 中的 ENABLE_COPY_LATEX 设为 true
    */

    /* 隐藏 LaTeX 源码文本（用于复制，不影响显示） */
    .mjx-copytext {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      margin: -1px !important;
      padding: 0 !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    /* 让隐藏文本有定位参考 */
    mjx-container {
      position: relative !important;
    }
  </style>

  <script>
    /*
      ===== 开关：是否启用“复制 LaTeX 源码” =====
      false = 关闭（推荐默认）
      true  = 开启
    */
    const ENABLE_COPY_LATEX = false;

    window.MathJax = {
      /*
        显式加载 ams 扩展
      */
      loader: {
        load: ['[tex]/ams']
      },

      tex: {
        /*
          支持：
          $...$, \(...\), $$...$$, \[...\]
        */
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        tags: 'ams',

        /*
          启用 ams 包
        */
        packages: { '[+]': ['ams'] }
      },

      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],

        /*
          根据开关决定是否添加复制功能
        */
        renderActions: ENABLE_COPY_LATEX ? {
          addCopyText: [155, (doc) => {
            for (const math of doc.math) {
              MathJax.config.addCopyText(math, doc);
            }
          }]
        } : {}
      },

      /*
        ===== 复制 LaTeX 源码函数（可选功能）=====
        仅在 ENABLE_COPY_LATEX = true 时生效
      */
      addCopyText(math, doc) {
        if (!ENABLE_COPY_LATEX) return;

        const adaptor = doc.adaptor;
        const latexSource = math.start.delim + math.math + math.end.delim;

        const hiddenText = adaptor.node(
          'span',
          {
            class: 'mjx-copytext',
            'aria-hidden': 'true'
          },
          [adaptor.text(latexSource)]
        );

        adaptor.append(math.typesetRoot, hiddenText);
      }
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
