<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
    /*
      ===== 可选功能：复制 LaTeX 源码 =====
      默认关闭（不会影响页面）
      如需开启，将 JS 中的 ENABLE_COPY_LATEX 设为 true
    */

    /*
      隐藏的 LaTeX 源码文本（用于复制，不影响页面显示）
    */
    .mjx-copytext {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      margin: -1px !important;
      padding: 0 !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    /*
      使 MathJax 容器支持插入隐藏文本
    */
    mjx-container {
      position: relative !important;
    }

    /*
      ===== 分类 & 标签样式（与 post.html 保持一致） =====
      用于文章头部 meta 信息展示
    */

    /*
      分类样式：
      使用红色突出显示
    */
    .post-category {
      color: #d14;
      font-weight: 500;
    }

    /*
      标签样式：
      使用蓝色，并设置右边距保证间距
    */
    .post-tag {
      color: #2a7ae2;
      margin-right: 6px;
    }

    /*
      扩展 meta 信息整体样式
    */
    .post-meta-extended {
      margin-top: 6px;
      font-size: 0.9em;
      color: #828282;
      line-height: 1.7;
    }
  </style>

  <script>
    /*
      ===== 开关：是否启用“复制 LaTeX 源码” =====
      false = 关闭
      true  = 开启
    */
    const ENABLE_COPY_LATEX = false;

    window.MathJax = {

      /*
        加载 ams 扩展（支持 aligned、cases、\text 等）
      */
      loader: {
        load: ['[tex]/ams']
      },

      tex: {
        /*
          支持：
          $...$
          \(...\)
          $$...$$
          \[...\]
        */
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,

        /*
          使用 AMS 自动编号
        */
        tags: 'ams',

        packages: { '[+]': ['ams'] }
      },

      options: {
        /*
          避免在这些标签中解析数学公式
        */
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],

        /*
          根据开关决定是否启用复制功能
        */
        renderActions: ENABLE_COPY_LATEX ? {
          addCopyText: [155, (doc) => {
            for (const math of doc.math) {
              MathJax.config.addCopyText(math, doc);
            }
          }]
        } : {}
      },

      /*
        ===== 实现“复制 LaTeX 源码” =====
        在每个公式节点中插入隐藏的 LaTeX 文本
      */
      addCopyText(math, doc) {
        if (!ENABLE_COPY_LATEX) return;

        const adaptor = doc.adaptor;

        /*
          获取完整 LaTeX（包含定界符）
        */
        const latexSource = math.start.delim + math.math + math.end.delim;

        /*
          创建隐藏节点
        */
        const hiddenText = adaptor.node(
          'span',
          {
            class: 'mjx-copytext',
            'aria-hidden': 'true'
          },
          [adaptor.text(latexSource)]
        );

        /*
          插入到公式 DOM 中
        */
        adaptor.append(math.typesetRoot, hiddenText);
      }
    };
  </script>

  <!-- MathJax 主脚本 -->
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
