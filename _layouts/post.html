---
layout: default
---
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.21.0/tocbot.css">

<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<style>
  /*
    页面整体布局：最左侧目录 + 中间留白 + 右侧正文
  */
  .post-layout-container {
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    gap: 80px;
  }

  /* 左侧目录 */
  .post-sidebar {
    width: 320px;
    min-width: 320px;
    position: sticky;
    top: 80px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    flex-shrink: 0;
  }

  /* 右侧正文 */
  .post-main-content {
    width: min(760px, 100%);
    min-width: 0;
    flex: 1;
  }

  /* 目录标题 */
  .toc-title {
    font-weight: bold;
    margin-bottom: 12px;
    color: #555;
    font-size: 1.08em;
  }

  /* 目录样式 */
  .toc-list {
    margin-top: 10px !important;
    font-size: 0.98em;
    line-height: 1.7;
    padding-left: 1.2em;
  }

  .toc-link {
    text-decoration: none;
  }

  .is-active-link {
    font-weight: bold;
    color: #2a7ae2;
  }

  /* 评论区 */
  .comments {
    margin-top: 50px;
    padding-top: 30px;
    border-top: 1px solid #e8e8e8;
  }

  /* 移动端适配 */
  @media screen and (max-width: 1100px) {
    .post-layout-container {
      display: block;
    }

    .post-sidebar {
      display: none;
    }

    .post-main-content {
      width: 100%;
    }
  }
</style>

<div class="post-layout-container">

  <aside class="post-sidebar">
    <div class="toc-title">Table of Contents</div>
    <div class="js-toc"></div>
  </aside>

  <article class="post h-entry post-main-content" itemscope itemtype="http://schema.org/BlogPosting">

    <header class="post-header">
      <h1 class="post-title p-name" itemprop="name headline">
        {{ page.title | escape }}
      </h1>

      <p class="post-meta">
        <time class="dt-published"
              datetime="{{ page.date | date_to_xmlschema }}"
              itemprop="datePublished">
          {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
          {{ page.date | date: date_format }}
        </time>

        <span id="busuanzi_container_page_pv" style="display:none; color: #828282; margin-left: 5px;">
          | &nbsp; Views: <span id="busuanzi_value_page_pv"></span>
        </span>
      </p>
    </header>

    <div class="post-content e-content js-toc-content" itemprop="articleBody">
      {{ content }}
    </div>

    <div class="comments">
      <h2 style="margin-bottom: 20px;">Comments</h2>

      <script src="https://giscus.app/client.js"
              data-repo="shuao-chen/shuao-chen.github.io"
              data-repo-id="R_kgDORuLgIA"
              data-category="Announcements"
              data-category-id="DIC_kwDORuLgIM4C5Ez_"
              data-mapping="pathname"
              data-strict="0"
              data-reactions-enabled="1"
              data-emit-metadata="0"
              data-input-position="bottom"
              data-theme="preferred_color_scheme"
              data-lang="en"
              crossorigin="anonymous"
              async>
      </script>
    </div>

  </article>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.21.0/tocbot.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function() {

    /*
      初始化目录生成（tocbot）
      从正文中提取 h1-h4 自动生成目录
    */
    tocbot.init({
      tocSelector: '.js-toc',
      contentSelector: '.js-toc-content',
      headingSelector: 'h1, h2, h3, h4',
      scrollSmooth: true,
      scrollSmoothOffset: -80,
      headingsOffset: 80,
      collapseDepth: 3
    });

  });
</script>
