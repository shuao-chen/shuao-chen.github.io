---
layout: default
---
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.21.0/tocbot.css">

<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<style>
  /*
    参数说明：
    --toc-left-gap: 目录距离屏幕左边的空隙
    --toc-width: 目录宽度
    --toc-content-gap: 目录和正文之间的空隙
    --content-right-gap: 正文距离屏幕右边的空隙
  */
  :root {
    --toc-left-gap: 24px;
    --toc-width: 480px;
    --toc-content-gap: 72px;
    --content-right-gap: 48px;
    --toc-top: 90px;
  }

  /*
    外层容器不参与横向布局
  */
  .post-layout-container {
    display: block;
  }

  /*
    左侧目录：
    永远固定在左边
  */
  .post-sidebar {
    position: fixed;
    left: var(--toc-left-gap);
    top: var(--toc-top);
    width: var(--toc-width);
    max-height: calc(100vh - 110px);
    overflow-y: auto;
    box-sizing: border-box;
  }

  /*
    正文区域：
    从“目录 + 目录右侧空隙”之后开始，
    一直到“屏幕右边留一点距离”为止
  */
  .post-main-content {
    margin-left: calc(var(--toc-left-gap) + var(--toc-width) + var(--toc-content-gap));
    margin-right: var(--content-right-gap);
    min-width: 0;
  }

  /* 目录标题 */
  .toc-title {
    font-weight: bold;
    margin-bottom: 12px;
    color: #555;
    font-size: 1.08em;
  }

  /* 目录样式 */
  .toc-list {
    margin-top: 10px !important;
    font-size: 0.98em;
    line-height: 1.7;
    padding-left: 1.2em;
  }

  .toc-link {
    text-decoration: none;
  }

  .is-active-link {
    font-weight: bold;
    color: #2a7ae2;
  }

  /* 评论区 */
  .comments {
    margin-top: 50px;
    padding-top: 30px;
    border-top: 1px solid #e8e8e8;
  }

  /*
    极窄屏幕下仍然保留目录会严重挤压正文。
    这里不隐藏目录，只是自动缩小目录宽度和间距。
  */
  @media screen and (max-width: 1600px) {
    :root {
      --toc-width: 420px;
      --toc-content-gap: 56px;
      --content-right-gap: 36px;
    }
  }

  @media screen and (max-width: 1400px) {
    :root {
      --toc-width: 360px;
      --toc-content-gap: 40px;
      --content-right-gap: 28px;
      --toc-left-gap: 16px;
    }
  }

  @media screen and (max-width: 1200px) {
    :root {
      --toc-width: 300px;
      --toc-content-gap: 28px;
      --content-right-gap: 20px;
      --toc-left-gap: 12px;
    }
  }
</style>

<div class="post-layout-container">

  <aside class="post-sidebar">
    <div class="toc-title">Table of Contents</div>
    <div class="js-toc"></div>
  </aside>

  <article class="post h-entry post-main-content" itemscope itemtype="http://schema.org/BlogPosting">

    <header class="post-header">
      <h1 class="post-title p-name" itemprop="name headline">
        {{ page.title | escape }}
      </h1>

      <p class="post-meta">
        <time class="dt-published"
              datetime="{{ page.date | date_to_xmlschema }}"
              itemprop="datePublished">
          {%- assign date_format = site.minima.date_format | default: "%b %-d, %Y" -%}
          {{ page.date | date: date_format }}
        </time>

        <span id="busuanzi_container_page_pv" style="display:none; color: #828282; margin-left: 5px;">
          | &nbsp; Views: <span id="busuanzi_value_page_pv"></span>
        </span>
      </p>
    </header>

    <div class="post-content e-content js-toc-content" itemprop="articleBody">
      {{ content }}
    </div>

    <div class="comments">
      <h2 style="margin-bottom: 20px;">Comments</h2>

      <script src="https://giscus.app/client.js"
              data-repo="shuao-chen/shuao-chen.github.io"
              data-repo-id="R_kgDORuLgIA"
              data-category="Announcements"
              data-category-id="DIC_kwDORuLgIM4C5Ez_"
              data-mapping="pathname"
              data-strict="0"
              data-reactions-enabled="1"
              data-emit-metadata="0"
              data-input-position="bottom"
              data-theme="preferred_color_scheme"
              data-lang="en"
              crossorigin="anonymous"
              async>
      </script>
    </div>

  </article>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.21.0/tocbot.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function() {

    /*
      初始化目录生成（tocbot）
      从正文中提取 h1-h4 自动生成目录
    */
    tocbot.init({
      tocSelector: '.js-toc',
      contentSelector: '.js-toc-content',
      headingSelector: 'h1, h2, h3, h4',
      scrollSmooth: true,
      scrollSmoothOffset: -80,
      headingsOffset: 80,
      collapseDepth: 3
    });

  });
</script>
